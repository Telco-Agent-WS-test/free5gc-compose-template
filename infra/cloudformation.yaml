AWSTemplateFormatVersion: '2010-09-09'
Description: Base infrastructure for free5GC UPF workshop

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
  SubnetId:
    Type: AWS::EC2::Subnet::Id
  AllowedCidr:
    Type: String
    Default: 172.31.0.0/16
  InstanceType:
    Type: String
    Default: t3.medium
  GitHubRepo:
    Type: String
    Default: https://github.com/free5gc/free5gc-compose.git

Resources:
  Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref Role]

  SG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Base SG for free5GC EC2
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowedCidr

Outputs:
  SGId:
    Value: !Ref SG
  InstanceProfileName:
    Value: !Ref InstanceProfile
